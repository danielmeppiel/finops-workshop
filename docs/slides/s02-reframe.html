<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../app.css"><link rel="stylesheet" href="../base.css"></head>
<body>
<div class="slide">
  <div class="kick">The reframe</div>
  <h1 class="ttl">A variance you engineer, not a price you negotiate.</h1>
  <div class="gov">Model rate × token volume. The loop sets both.</div>

  <svg class="conn" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="dot" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5">
        <circle cx="5" cy="5" r="4" fill="#6c7931"/>
      </marker>
    </defs>
    <path d="M745 276 C745 322 580 318 580 356" stroke="#6c7931" stroke-width="2.5" fill="none" stroke-linecap="round" marker-end="url(#dot)"/>
    <path d="M745 276 C745 322 910 318 910 356" stroke="#6c7931" stroke-width="2.5" fill="none" stroke-linecap="round" marker-end="url(#dot)"/>
  </svg>

  <div class="loop-pill">
    <div>LOOP</div><span>sets both</span>
  </div>

  <div class="bill">BILL</div>
  <div class="eq">=</div>
  <div class="factor model"><b>MODEL</b><span>rate</span><em>$/Mtok</em></div>
  <div class="times">×</div>
  <div class="factor tokens"><b>TOKENS</b><span>volume</span><em>turns × context</em></div>

  <div class="src"><b>Source:</b> deck synthesis — model rate × token volume; loop design controls both.</div>
  <div class="tagr">The Agentic SDLC Bill</div>
</div>
<style>
  .conn{position:absolute;left:0;top:0;width:1280px;height:720px;pointer-events:none}
  .loop-pill{position:absolute;left:625px;top:202px;width:240px;height:72px;border-radius:16px;
    background:var(--olive);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 14px 30px rgba(108,121,49,.28)}
  .loop-pill div{font-size:26px;font-weight:800;letter-spacing:1px}
  .loop-pill span{font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:#eef0e0;margin-top:4px}
  .bill{position:absolute;left:235px;top:360px;width:150px;height:150px;border-radius:18px;
    background:#26261f;color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:32px;font-weight:800;letter-spacing:.6px;box-shadow:0 14px 30px rgba(38,38,31,.22)}
  .eq,.times{position:absolute;top:360px;height:150px;width:60px;display:flex;align-items:center;justify-content:center;
    font-size:40px;font-weight:700;color:var(--muted)}
  .eq{left:385px}.times{left:715px}
  .factor{position:absolute;top:360px;width:270px;height:150px;border:1px solid var(--line);border-radius:18px;
    background:#fff;box-shadow:0 1px 2px rgba(16,24,40,.05),0 14px 30px rgba(16,24,40,.08);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .factor b{font-size:30px;letter-spacing:-.3px;color:var(--ink)}
  .factor span{font-size:18px;font-weight:800;color:var(--olive-ink);margin-top:10px}
  .factor em{font-style:normal;font-size:13px;color:var(--muted);margin-top:8px}
  .factor.model{left:445px}.factor.tokens{left:775px}
</style>
</body></html>
